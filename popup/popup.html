<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <img src="omnira_logo.png" class="logo" alt="Omnira Logo">
            <h1>Omnira</h1>
            <p class="subtitle">Control your digital space</p>
        </div>

        <!-- Controls -->
        <div class="controls">

            <div class="section">
                <span>Home Page</span>
                <label class="switch">
                    <input type="checkbox" id="homePageToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="section">
                <span>Side Bar</span>
                <label class="switch">
                    <input type="checkbox" id="sideBarToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="section">
                <span>Recommendations</span>
                <label class="switch">
                    <input type="checkbox" id="recommendationsToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="section">
                <span>Comments</span>
                <label class="switch">
                    <input type="checkbox" id="commentsToggle">
                    <span class="slider"></span>
                </label>
            </div>

        </div>

    </div>

    <script src="popup.js"></script>
</body>
</html>
